# Remote search job config: search DiskANN-RS PQ (memory) presets
#
# Target preset in:
#   ann-benchmark-epeshared/ann_benchmarks/algorithms/diskann_rs/config.yml
#     module: ann_benchmarks.algorithms.diskann_rs
#     name:   diskann-rs-pq-memory
#
# How to use with run_remote.sh:
#   1) Copy this file to conf/job-conf.yml (run_remote.sh auto-picks conf/job-conf.(yml|yaml|json|toml))
#      cp conf/job-conf/job-conf.remote-search-pq-memory.yml conf/job-conf.yml
#   2) Edit hdf5 + remote_hdf5_dir as needed
#   3) ./run_remote.sh

# (required) Local path to the dataset .hdf5 file.
hdf5: /mnt/nvme2n1p1/xtang/ann-data/dbpedia-openai-1000k-angular.hdf5

# Optional distance/metric override. Empty => auto-detect from HDF5 attrs['distance'].
metric: ""

# Search only (expects indexes already built).
#
# Recommended pattern (keeps build and search outputs separate):
# - Set `run_id` to a NEW id for this search run.
# - Set `index_dir` to the BUILD run_id to reuse indexes (see run_local.sh "index_dir-as-runid" mode).
stage: search

# Make the run_id stable so remote runs are easy to find/reuse.
# You can change this per experiment.
run_id: "s9e-pq-mem-search-20260303-0852"
resume_runid: ""
index_dir: "s9e-pq-mem-index-20260303-0852"

# No cleanup by default; keep artifacts for inspection.
# IMPORTANT: quote "no"/"yes" to avoid YAML parsing them as booleans.
delete_index_after_run: "no"

# Run all run_groups under the selected preset algo `name`.
# (This will search multiple parameterizations defined under diskann-rs-pq-memory.)
# Note: when `index_dir` is a run_id and `run_all: true`, the harness pre-validates that
# every required case has an index under the build run folder; if you built only a subset,
# set `run_group_prefix_pq` to match the subset.
run_all: true

# Single-algo mode: only run one preset algo.
compare: false

# Must be set when run_all=true and compare=false.
# This is the `name:` field in diskann_rs/config.yml.
name: diskann-rs-pq-memory

# These are unused in single-algo mode but kept for clarity.
algo: pq
name_pq: ""
name_spherical: ""

# Optional: filter which run_groups run (leave empty to run all groups).
# These prefixes are mainly used in compare mode; keeping empty here is simplest.
run_group_prefix_pq: ""
run_group_prefix_spherical: ""

# Framework defaults (-k etc) are fine for search runs.
k: 10
reps: 1
batch: true

# If true, run EMON collection+processing around each case's search stage.
# Requires Intel SEP/EMON on the runner.
emon_search: false
emon_path: ""
cpu_bind: 0-15

# Repeat the entire case execution (stage=search only).
# Mutually exclusive:
# - search_repeat: fixed integer repeat count per case
# - search_repeat_thresh_hold: seconds; per case, run once to measure t, then repeat = floor(thresh / t)
search_repeat: ""
search_repeat_thresh_hold: ""

# Optional override of ann-benchmark diskann_rs/config.yml.
# Empty => use repo default (recommended).
config_yml: ""

# Remote-only fields used by run_remote.sh
# Control what to sync back from remote to local at the end.
# - all:     sync everything under result/<dataset>/ (includes large index/*.bin)
# - results: sync only small result artifacts (skip cases/**/index/**, cases/**/data/**, *.bin)
# - none:    do not sync anything back
remote_fetch: results

# Destination directory on remote to store the synced HDF5.
remote_hdf5_dir: "~/ann-data"

# If true, run setup_remote.sh before executing.
remote_setup: true

# If true, print planned remote commands but do not execute.
remote_dry_run: false
